<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體內毒素負荷評估問卷 | Toxin Burden Assessment</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC','Microsoft JhengHei','Noto Sans TC',sans-serif;background:#f0f4f8;color:#2d3748;line-height:1.6}
    .hdr{background:linear-gradient(135deg,#0d2744 0%,#1a365d 50%,#2b6cb0 100%);color:#fff;padding:52px 24px 44px;text-align:center}
    .hdr-ico{font-size:52px;margin-bottom:16px}
    .hdr h1{font-size:1.9rem;font-weight:800;letter-spacing:-.5px;margin-bottom:6px}
    .hdr h2{font-size:.95rem;font-weight:400;opacity:.8;margin-bottom:16px;letter-spacing:1px}
    .hdr-desc{max-width:640px;margin:0 auto;background:rgba(255,255,255,.12);border-radius:12px;padding:14px 20px;font-size:.86rem;line-height:1.7;opacity:.93}
    .wrap{max-width:880px;margin:0 auto;padding:28px 16px 60px}
    .disc{background:#fffbeb;border-left:4px solid #f59e0b;border-radius:10px;padding:14px 18px;margin-bottom:24px;font-size:.83rem;color:#78350f}
    .disc strong{color:#92400e}
    .pgbox{background:#fff;border-radius:14px;padding:16px 22px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.07);position:sticky;top:8px;z-index:10}
    .pgrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
    .pglbl{font-size:.8rem;color:#718096}
    .pgnum{font-weight:700;color:#2b6cb0;font-size:.88rem}
    .pgtrack{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
    .pgfill{height:100%;background:linear-gradient(90deg,#2b6cb0,#4299e1);border-radius:4px;transition:width .3s ease;width:0%}
    .sec{background:#fff;border-radius:16px;padding:26px 26px 18px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .sechd{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #f0f4f8}
    .secico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
    .secinfo h3{font-size:1rem;font-weight:700;color:#1a365d}
    .secinfo p{font-size:.77rem;color:#718096;margin-top:1px}
    .badge{display:inline-block;background:#ebf8ff;color:#2b6cb0;border-radius:7px;padding:1px 9px;font-size:.7rem;font-weight:600;margin-left:7px;vertical-align:middle}
    .qi{display:flex;align-items:flex-start;gap:13px;padding:12px 9px;cursor:pointer;border-radius:9px;transition:background .13s;border-bottom:1px solid #f7fafc}
    .qi:last-child{border-bottom:none}
    .qi:hover{background:#f7fafc}
    .qi.ck{background:#ebf8ff}
    .qi input[type=checkbox]{width:19px;height:19px;border-radius:4px;accent-color:#2b6cb0;cursor:pointer;flex-shrink:0;margin-top:3px}
    .qlbl{flex:1}
    .qzh{font-size:.91rem;font-weight:500;color:#2d3748}
    .qen{font-size:.77rem;color:#a0aec0;margin-top:2px}
    .subwrap{text-align:center;margin:32px 0}
    .subbtn{background:linear-gradient(135deg,#2b6cb0,#4299e1);color:#fff;border:none;padding:16px 52px;font-size:1rem;font-weight:700;border-radius:50px;cursor:pointer;box-shadow:0 4px 18px rgba(66,153,225,.4);transition:all .2s;letter-spacing:.5px}
    .subbtn:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(66,153,225,.5)}
    .subnote{font-size:.78rem;color:#a0aec0;margin-top:9px}
    #res{display:none;animation:fi .5s ease}
    @keyframes fi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .rbanner{text-align:center;padding:42px 24px;background:linear-gradient(135deg,#0d2744,#1a365d,#2b6cb0);color:#fff;border-radius:16px;margin-bottom:22px}
    .rbanner h2{font-size:1.45rem;font-weight:700;margin-bottom:7px}
    .rbanner p{opacity:.8;font-size:.88rem;margin-bottom:14px}
    .chips{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
    .chip{background:rgba(255,255,255,.18);border-radius:50px;padding:7px 20px;font-size:.83rem;font-weight:600}
    .chartbox{background:#fff;border-radius:16px;padding:30px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .ctitle{font-size:1rem;font-weight:700;color:#1a365d;margin-bottom:3px}
    .csub{font-size:.8rem;color:#718096;margin-bottom:22px}
    .clay{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
    .ccw{flex:0 0 250px;max-width:250px}
    .cleg{flex:1;min-width:170px}
    .legitem{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;margin-bottom:3px}
    .legitem:hover{background:#f7fafc}
    .legdot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
    .legname{flex:1;font-size:.86rem;font-weight:600}
    .legpct{font-size:.86rem;font-weight:700}
    @media(max-width:540px){.ccw{flex:0 0 100%;max-width:220px;margin:0 auto}.cleg{width:100%}}
    .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px;margin-bottom:18px}
    .catcard{background:#fff;border-radius:13px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);border-left:5px solid}
    .cchd{display:flex;align-items:center;gap:9px;margin-bottom:12px}
    .ccico{font-size:24px}
    .cczh{font-size:.95rem;font-weight:700}
    .ccen{font-size:.7rem;color:#718096}
    .ccbar{height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;margin-bottom:7px}
    .ccfill{height:100%;border-radius:3px}
    .ccpct{font-size:1.45rem;font-weight:800;margin-bottom:3px}
    .rbadge{display:inline-block;padding:2px 10px;border-radius:11px;font-size:.7rem;font-weight:600}
    .rh{background:#fed7d7;color:#c53030}
    .rm{background:#fefcbf;color:#744210}
    .rl{background:#c6f6d5;color:#276749}
    .rn{background:#e2e8f0;color:#718096}
    .recbox{background:#fff;border-radius:16px;padding:30px;margin-bottom:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .recbox h3{font-size:1rem;font-weight:700;color:#1a365d;margin-bottom:18px;padding-bottom:12px;border-bottom:2px solid #f0f4f8}
    .reccard{background:#f7fafc;border-radius:11px;padding:16px 18px;margin-bottom:10px}
    .reccard h4{font-size:.88rem;font-weight:700;margin-bottom:5px}
    .reccard p{font-size:.8rem;color:#4a5568;line-height:1.7}
    .reccard ul{font-size:.8rem;color:#4a5568;margin:5px 0 8px 16px;line-height:1.9}
    .fin{background:linear-gradient(135deg,#ebf8ff,#e0f2fe);border-radius:16px;padding:26px;text-align:center;margin-bottom:28px}
    .fin h4{color:#1a365d;font-size:.97rem;font-weight:700;margin-bottom:9px}
    .fin p{color:#2c5282;font-size:.82rem;line-height:1.75}
    .fin a{color:#2b6cb0}
    .rstwrap{text-align:center;margin-bottom:18px}
    .rstbtn{background:#fff;color:#2b6cb0;border:2px solid #2b6cb0;padding:11px 36px;font-size:.9rem;font-weight:600;border-radius:50px;cursor:pointer;transition:all .2s}
    .rstbtn:hover{background:#2b6cb0;color:#fff}
    @media(max-width:500px){.hdr h1{font-size:1.45rem}.sec{padding:18px 14px 12px}.catgrid{grid-template-columns:1fr 1fr}}
    @media(max-width:360px){.catgrid{grid-template-columns:1fr}}
  </style>
</head>
